# Ruff lint configuration for SRE Event Watchdog.
line-length = 100
target-version = "py311"

[lint]
# Pyflakes (real errors), pycodestyle errors/warnings, and import sorting.
select = ["E", "F", "W", "I"]

[lint.per-file-ignores]
# Test modules set env vars before importing the app, so imports are
# intentionally not at the top of the file.
"tests/*" = ["E402"]
